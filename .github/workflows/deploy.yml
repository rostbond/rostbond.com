name: Build and Deploy Resume

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Jinja2 CLI
        run: pip install jinja2-cli

      - name: Setup Typst
        uses: chataigne/setup-typst@v1

      - name: Prepare dist folder
        run: mkdir -p dist

      - name: Render HTML
        run: jinja2 index.html.j2 resume.json > dist/index.html

      - name: Render PDF
        run: typst compile resume.typ dist/resume.pdf

      - name: Copy favicon
        run: cp favicon.png dist/favicon.png

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
