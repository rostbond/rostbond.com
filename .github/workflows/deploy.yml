name: Build and Deploy Resume

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install jinja2

      - name: Prepare dist folder
        run: mkdir -p dist
        
      - name: Run HTML build script
        run: python build.py

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Render PDF via Typst
        run: typst compile resume.typ dist/resume.pdf

      - name: Copy favicon
        run: cp favicon.png dist/favicon.png || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
